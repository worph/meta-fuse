# WsgiDAV Configuration for meta-fuse Virtual Filesystem

host: 0.0.0.0
port: 8080

# Authentication is delegated to a custom DomainController that validates the
# basic-auth password against meta-fuse's per-device token store. Any
# non-empty username is accepted; the password IS the token (`mfwd_*`).
http_authenticator:
  domain_controller: webdav_token_controller.WebdavTokenController
  accept_basic: true
  accept_digest: false
  default_to_digest: false

# Mount the virtual filesystem
provider_mapping:
  "/webdav":
    root: /mnt/virtual
    readonly: true

# Logging
verbose: 1
logging:
  enable_loggers: []

# Server configuration
server: cheroot
server_args:
  numthreads: 10

# HTTP configuration
add_header_MS_Author_Via: false

# Hotfixes for path encoding
hotfixes:
  unquote_path_info: false

# Directory browsing
dir_browser:
  enable: true
  response_trailer: ""
  davmount: false
  ms_sharepoint_support: false
  ms_sharepoint_urls: false
